<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册 - 交通流量识别系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: url('/static/images/background.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: '微软雅黑', sans-serif;
        }
        .register-wrapper {
            background: rgba(0,0,0,0.6);
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            color: white;
            width: 100%;
            max-width: 400px;
        }
        .form-control {
            margin-bottom: 1.5rem;
        }
        .btn-custom {
            width: 100%;
            background-color: #0d6efd;
            color: white;
            font-size: 1.2rem;
        }
        .btn-custom:hover {
            background-color: #0b5ed7;
        }
        .title {
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 700;
        }
        .error-message {
            color: #ff4d4f;
            text-align: center;
            margin-bottom: 1rem;
        }
        a {
            color: #0d6efd;
            text-decoration: underline;
            cursor: pointer;
        }
        a:hover {
            color: #0b5ed7;
        }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <h2 class="title">注册新账号</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error-message">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST" action="/register">
            <input type="text" name="username" class="form-control" placeholder="用户名" required>
            <input type="password" name="password" class="form-control" placeholder="密码" required>
            <input type="password" name="confirm" class="form-control" placeholder="确认密码" required>
            <button type="submit" class="btn btn-custom">注册</button>
        </form>
        <p class="mt-3 text-center">已有账号？<a href="/">去登录</a></p>
    </div>
</body>
</html>
