<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智能助手界面</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: url('/static/images/background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #1f2328;
            font-family: '微软雅黑', "Segoe UI", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-container {
            width: 900px;
            max-width: 100%;
            margin: 2rem auto;
            padding: 20px;
            overflow-y: auto;
            border-radius: 1rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.8);
            color: #1f2328;
            height: 70vh;
            flex: none;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin: 12px 0;
            padding: 12px;
            font-size: 16px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
            animation: fadeIn 0.3s ease;
        }

        .user-message {
            align-self: flex-end;
            background: #409eff;
            color: white;
            border-radius: 0.75rem 0.75rem 0.75rem 0;
            max-width: 45%;
        }

        .assistant-message {
            align-self: flex-start;
            background: rgba(240, 240, 240, 0.8);
            border: 1px solid rgba(200, 200, 200, 0.8);
            border-radius: 0.75rem 0.75rem 0 0.75rem;
            color: #1f2328;
            max-width: 45%;
        }

        .input-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 1rem;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .input-box {
            max-width: 100%;
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .prompt-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(160,160,160,0.8);
            border-radius: 0.75rem;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
            color: #1f2328;
            transition: all 0.2s;
        }

        .prompt-input::placeholder {
            color: rgba(100,100,100,0.7);
        }

        .prompt-input:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.2);
            outline: none;
            background: white;
        }

        .send-button {
            background: #409eff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-button:hover {
            opacity: 0.9;
        }

        .typing-indicator {
            display: inline-flex;
            padding: 8px 16px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 0.75rem;
            color: #1f2328;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background: #888;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <!-- 消息将动态插入 -->
    </div>

    <div class="input-container">
        <div class="input-box">
            <input type="text" class="prompt-input" placeholder="输入你的问题..." id="promptInput" autocomplete="off" />
            <button class="send-button" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const promptInput = document.getElementById('promptInput');

        // 页面加载欢迎语
        window.onload = () => {
            addMessage("您好，请问您有什么问题？", 'assistant');
        };

        async function sendMessage() {
            const userMessage = promptInput.value.trim();
            if (!userMessage) return;

            addMessage(userMessage, 'user');
            promptInput.value = '';
            showTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: userMessage })
                });

                hideTypingIndicator();

                if (!response.ok) {
                    const errorData = await response.json();
                    addMessage('错误: ' + (errorData.error || '未知错误'), 'assistant');
                    return;
                }

                const data = await response.json();
                addMessage(data.reply || '模型未返回内容。', 'assistant');
            } catch (error) {
                hideTypingIndicator();
                addMessage('请求失败，请检查网络或稍后再试。', 'assistant');
            }
        }

        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            messageDiv.textContent = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const typing = document.createElement('div');
            typing.className = 'message assistant-message typing-indicator-wrapper';
            typing.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot" style="animation-delay: 0s"></div>
                    <div class="typing-dot" style="animation-delay: 0.2s"></div>
                    <div class="typing-dot" style="animation-delay: 0.4s"></div>
                </div>
            `;
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicators = document.querySelectorAll('.typing-indicator-wrapper');
            if (indicators.length > 0) {
                indicators[indicators.length - 1].remove();
            }
        }

        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
